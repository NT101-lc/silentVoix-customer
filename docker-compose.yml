services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: silentvoix
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./backend/src/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      PORT: 4000
      DATABASE_URL: postgres://postgres:postgres@db:5432/silentvoix
      JWT_SECRET: change-this-in-production
      JWT_EXPIRES_IN: 7d
      FRONTEND_ORIGIN: http://localhost:8080
    depends_on:
      - db
    ports:
      - "4000:4000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: silentvoix-customer-frontend:latest
    depends_on:
      - backend
    ports:
      - "8080:80"
    restart: unless-stopped

volumes:
  postgres-data:
